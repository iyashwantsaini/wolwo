name: wolwo
description: A free, beautiful, open-source 4K wallpaper app.
publish_to: "none"

version: 2.0.3+4

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Networking + caching
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.2

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  palette_generator: ^0.3.3+5
  image: ^4.3.0

  # Pagination grid
  infinite_scroll_pagination: ^4.1.0
  flutter_staggered_grid_view: ^0.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # Wallpaper / files / permissions
  async_wallpaper: ^3.1.0
  gallery_saver_plus: ^3.2.6
  permission_handler: ^11.3.1
  share_plus: ^10.1.2

  # UI niceties
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  flutter_animate: ^4.5.2

  flutter_cache_manager: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/launcher/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/launcher/icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0B0B10"
  adaptive_icon_foreground: "assets/launcher/foreground.png"
  adaptive_icon_monochrome: "assets/launcher/monochrome.png"

flutter_native_splash:
  color: "#0B0B10"
  image: "assets/launcher/splash.png"
  android_12:
    color: "#0B0B10"
    image: "assets/launcher/splash.png"
